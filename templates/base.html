{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}TaskFlow{% endblock %}</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link rel="stylesheet" href="{% static 'css/style.css'%}" />

        <style>
            html, body {
                height: 100%;
                /* Ensures background color fills the screen */
                background-color: var(--bs-body-bg); 
                color: var(--bs-body-color);
            }
            /* Make the theme toggle look exactly like a link */
            #theme-toggle {
                cursor: pointer;
                text-align: left;
            }
        </style>

        <script>
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme || systemTheme);
        </script>
    </head>
    
    <body>
        <div class="d-md-none p-3 bg-body-tertiary border-bottom d-flex justify-content-between align-items-center fixed-top">
            <a href="{% url 'dashboard'%}" style="text-decoration: none;">
                <div class="d-flex align-items-center gap-1">
                <img
                    src="{% static 'image/Tasklogo.png' %}"
                    alt="Logo"
                    style="width: 35px; object-fit: contain" />
                <h1 class="h3 fw-bold m-0 brand-name">TaskFlow</h1>
            </div>
            </a>
            <button
                class="btn btn-light"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebarMenu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <aside
            class="sidebar offcanvas-md offcanvas-start d-flex flex-column py-4 bg-body-tertiary border-end"
            tabindex="-1"
            id="sidebarMenu"
            style="min-height: 100vh;"> 
            
            <div class="px-4 mb-4">
                <a href="{% url 'dashboard'%}" style="text-decoration: none;">
                    <div class="d-flex align-items-center gap-1 mb-2">
                    <img
                        src="{% static 'image/Tasklogo.png' %}"
                        alt="Logo"
                        style="width: 40px; object-fit: contain" />
                    <h1 class="h3 fw-bold m-0 brand-name">TaskFlow</h1>
                </div>
                </a>
                <div class="d-flex align-items-center text-muted small">
                    <i class="fa-solid fa-graduation-cap me-2"></i>
                    <span>{{ user.first_name|default:"Role not set"|capfirst}}</span>
                </div>
                <div class="small text-secondary fw-bold">
                    <span>{{ user.username|default:"(no username)" }}</span>
                </div>
            </div>

            <nav class="nav flex-column px-3 flex-grow-1">
                <a href="{% url 'dashboard'%}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %} active {% endif %}">
                    <i class="fa-solid fa-grip-vertical me-2 w-25px"></i>
                    Dashboard
                </a>
                <a href="{% url 'tasks'%}" class="nav-link {% if request.resolver_match.url_name == 'tasks' %} active {% endif %}">
                    <i class="fa-solid fa-list-check me-2 w-25px"></i> Tasks
                </a>
                <a href="{% url 'analytics' %}" class="nav-link {% if request.resolver_match.url_name == 'analytics' %} active {% endif %}">
                    <i class="fa-solid fa-chart-line me-2 w-25px"></i> Analytics
                </a>
                <a href="{% url 'settings' %}" class="nav-link {% if request.resolver_match.url_name == 'settings' %} active {% endif %}">
                    <i class="fa-solid fa-gear me-2 w-25px"></i> Settings
                </a>
            </nav>

            <div class="px-3 mt-auto">
                 <!-- <button id="theme-toggle" class="nav-link bg-transparent border-0 text-start w-100">
                    <i id="theme-icon" class="fa-solid fa-moon me-2 w-25px"></i> 
                    <span id="theme-text">Dark Mode</span>
                </button> -->
                <a href="{% url 'logout' %}" class="logout-link">
                    <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>
                    Logout
                </a>
            </div>
        </aside>

        <main class="flex-grow-1 bg-body" style="min-height: 100vh;">
            {% block content %} {% endblock %}
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        {% block scripts %} {% endblock %}
    </body>
</html>
