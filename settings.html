<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - TaskFlow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-content">
            <div class="brand-area">
                <h1 class="brand-logo">TaskFlow</h1>
                <div class="user-info">
                    <span class="role-line"><i class="fa-solid fa-graduation-cap"></i> Student</span>
                    <span class="user-name">Demo User</span>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link">
                    <i class="fa-solid fa-grip-vertical"></i> Dashboard
                </a>
                <a href="tasks.html" class="nav-link">
                    <i class="fa-solid fa-list-check"></i> Tasks
                </a>
                <a href="analytics.html" class="nav-link">
                    <i class="fa-solid fa-chart-line"></i> Analytics
                </a>
                <a href="settings.html" class="nav-link active">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <a href="index.html" class="logout-link">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <main class="content-area">
        
        <header class="page-header">
            <h2 class="page-title">Settings</h2>
            <p class="page-date">Sunday, January 18, 2026</p>
        </header>

        <div class="settings-container">
            <div class="settings-card">
                <div class="settings-header">
                    <h3>Profile Settings</h3>
                    <p>Manage your personal information and preferences</p>
                </div>

                <form class="settings-form">
                    
                    <div class="form-group">
                        <label><i class="fa-regular fa-user"></i> Full Name</label>
                        <input type="text" class="settings-input" value="Demo User">
                    </div>

                    <div class="form-group">
                        <label><i class="fa-regular fa-envelope"></i> Email</label>
                        <input type="email" class="settings-input" value="eee@rr.vv">
                    </div>

                    <div class="form-group">
                        <label><i class="fa-regular fa-clock"></i> Peak Energy Time</label>
                        <select class="settings-input">
                            <option>Morning Person (6 AM - 12 PM)</option>
                            <option>Afternoon Person (12 PM - 5 PM)</option>
                            <option>Night Owl (8 PM - 2 AM)</option>
                        </select>
                        <p class="input-helper">This helps us recommend the best times for your tasks</p>
                    </div>

                    <button type="button" class="save-btn">Save Changes</button>

                </form>
            </div>
        </div>

    </main>

</body>
</html>
